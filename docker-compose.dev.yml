version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rim-postgres-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rim_db_dev}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rim-network-dev

  redis:
    image: redis:7-alpine
    container_name: rim-redis-dev
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rim-network-dev

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: rim-pgbouncer-dev
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 5
      SERVER_RESET_QUERY: DISCARD ALL
      ADMIN_USERS: ${DB_USERNAME:-postgres}
    ports:
      - '6432:5432'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rim-network-dev

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rim-admin-be-dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-rim_db_dev}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-key-min-32-chars-long}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-12h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-key-min-32-chars}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMAIL_HOST: ${EMAIL_HOST:-smtp.zeptomail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-emailapikey}
      EMAIL_PASS: ${EMAIL_PASS:-wSsVR61wqUP4Df9/m2D/ce1qygtQA1OiRx91iVv36XP+SK/B9cdtnxecDAWgSaRKGWZtFGYQpLsvmkxU0mcMit54mF8AXiiF9mqRe1U4J3x17qnvhDzNXGlekBOPLYMAzwhqnWlhF8oq+g==}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@rim.ng}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-RIM Team}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME:-admin}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-password}
      # CSDP Phase 0 — pgbouncer URLs
      DATABASE_HOT_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@pgbouncer:5432/${DB_NAME:-rim_db_dev}
      DATABASE_BATCH_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@pgbouncer:5432/${DB_NAME:-rim_db_dev}
      DATABASE_DIRECT_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-rim_db_dev}
      CSDP_HOT_POOL_MAX: 20
      CSDP_BATCH_POOL_MAX: 3
      BATCH_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
    networks:
      - rim-network-dev
    command: npm run start:dev

  prometheus:
    image: prom/prometheus:latest
    container_name: rim-prometheus-dev
    restart: unless-stopped
    volumes:
      - ./test/performance/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts:/etc/prometheus/alerts
      - prometheus_dev_data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - rim-network-dev

  grafana:
    image: grafana/grafana:latest
    container_name: rim-grafana-dev
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    ports:
      # Moved from 3001 → 3002 to free host port 3001 for app-batch
      - '3002:3000'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_dev_data:/var/lib/grafana
    networks:
      - rim-network-dev

  app-batch:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rim-admin-be-batch-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      BATCH_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_HOT_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@pgbouncer:5432/${DB_NAME:-rim_db_dev}
      DATABASE_BATCH_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@pgbouncer:5432/${DB_NAME:-rim_db_dev}
      DATABASE_DIRECT_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-rim_db_dev}
      CSDP_HOT_POOL_MAX: 20
      CSDP_BATCH_POOL_MAX: 3
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-key-min-32-chars-long}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-12h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-key-min-32-chars}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.zeptomail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-emailapikey}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@rim.ng}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-RIM Team}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-rim_db_dev}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
    networks:
      - rim-network-dev
    command: npm run start:dev:batch

volumes:
  postgres_dev_data:
  redis_dev_data:
  prometheus_dev_data:
  grafana_dev_data:

networks:
  rim-network-dev:
    driver: bridge
