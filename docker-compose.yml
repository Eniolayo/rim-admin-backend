# Production compose for the RIM CSDP single-VM pilot.
# Run from /data/compose with:
#   docker compose --env-file /data/compose/.env -f /data/apps/rim-admin-backend/docker-compose.yml up -d
# For local dev, use docker-compose.dev.yml instead.

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rim-nginx
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /data/nginx/conf.d:/etc/nginx/conf.d:ro
      - /data/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - rim-network

  postgres:
    image: postgres:16-alpine
    container_name: rim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME required}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rim-network

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: rim-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 5
      SERVER_RESET_QUERY: DISCARD ALL
      ADMIN_USERS: ${DB_USERNAME}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rim-network

  redis:
    image: redis:7-alpine
    container_name: rim-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - /data/redis:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rim-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: rim-admin-be
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.zeptomail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@rim.ng}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-RIM Team}
      FRONTEND_URL: ${FRONTEND_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DATABASE_HOT_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME}
      DATABASE_BATCH_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME}
      DATABASE_DIRECT_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      CSDP_HOT_POOL_MAX: 20
      CSDP_BATCH_POOL_MAX: 3
      API_PREFIX: ${API_PREFIX:-api}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      CSDP_API_KEY: ${CSDP_API_KEY:?CSDP_API_KEY required}
      CSDP_API_KEY_SCOPES: ${CSDP_API_KEY_SCOPES:-csdp:profile,csdp:webhook,csdp:ingest}
      TEAMWEE_BASE_URL: ${TEAMWEE_BASE_URL:-}
      TEAMWEE_API_KEY: ${TEAMWEE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - rim-network
    command: node dist/src/main.js

  app-batch:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: rim-admin-be-batch
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BATCH_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DATABASE_HOT_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME}
      DATABASE_BATCH_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME}
      DATABASE_DIRECT_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      CSDP_HOT_POOL_MAX: 20
      CSDP_BATCH_POOL_MAX: 3
      API_PREFIX: ${API_PREFIX:-api}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      CSDP_API_KEY: ${CSDP_API_KEY:?CSDP_API_KEY required}
      CSDP_API_KEY_SCOPES: ${CSDP_API_KEY_SCOPES:-csdp:profile,csdp:webhook,csdp:ingest}
      TEAMWEE_BASE_URL: ${TEAMWEE_BASE_URL:-}
      TEAMWEE_API_KEY: ${TEAMWEE_API_KEY:-}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.zeptomail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@rim.ng}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-RIM Team}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - rim-network
    command: node dist/src/main.batch.js

networks:
  rim-network:
    driver: bridge
